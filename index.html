<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K4HLD STORE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f8f9fa;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: linear-gradient(135deg, #0a0a0a, #1e1e1e);
      color: #fff;
      padding: 2rem 1rem 1.5rem;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, transparent 70%);
      animation: headerGlow 8s infinite alternate;
    }
    @keyframes headerGlow {
      0% { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(1.1); opacity: 1; }
    }

    .logo {
      max-width: 160px;
      height: auto;
      position: relative;
      z-index: 1;
      display: block;
      margin: 0 auto 0.5rem;
    }

    .header .subtitle {
      font-size: 1.1rem;
      color: #ccc;
      position: relative;
      z-index: 1;
      font-style: italic;
      max-width: 500px;
      margin: 0 auto;
      line-height: 1.7;
    }
    .header .subtitle span {
      color: #d4af37;
      font-weight: 600;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 2rem 1rem 2rem;
      flex: 1;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.8rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.06);
      transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: flex;
      flex-direction: column;
      border: 1px solid #f0f0f0;
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
      border-color: #d4af37;
    }
    .card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      background-color: #e9ecef;
      transition: transform 0.4s ease;
      cursor: pointer;
    }
    .card:hover img {
      transform: scale(1.04);
    }
    .card-content {
      padding: 1.4rem;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }
    .card-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #1a1a1a;
      line-height: 1.4;
    }
    .card-desc {
      font-size: 0.93rem;
      color: #666;
      margin-bottom: 1.2rem;
      flex-grow: 1;
      line-height: 1.7;
    }
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.4rem;
      border-top: 1px solid #f0f0f0;
      padding-top: 1rem;
    }
    .price {
      font-size: 1.5rem;
      font-weight: 800;
      color: #0a0a0a;
      letter-spacing: 0.5px;
    }
    .whatsapp-btn {
      background-color: #25D366;
      color: #fff;
      border: none;
      padding: 0.6rem 1.3rem;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.25s ease;
      box-shadow: 0 4px 10px rgba(37, 211, 102, 0.25);
    }
    .whatsapp-btn:hover {
      background-color: #1da851;
      box-shadow: 0 6px 18px rgba(37, 211, 102, 0.4);
      transform: scale(1.03);
    }

    /* نافذة الصورة المنبثقة */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .lightbox.active {
      display: flex;
    }
    .lightbox img {
      max-width: 95%;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
    }
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 25px;
      color: #fff;
      font-size: 2.5rem;
      font-weight: bold;
      cursor: pointer;
      z-index: 10000;
      transition: 0.2s;
      background: none;
      border: none;
    }
    .lightbox-close:hover {
      color: #d4af37;
      transform: scale(1.2);
    }

    .floating-whatsapp {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background-color: #25D366;
      color: #fff;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4);
      z-index: 998;
      text-decoration: none;
      transition: all 0.3s ease;
      animation: floatPulse 2.2s infinite;
    }
    .floating-whatsapp:hover {
      background-color: #1da851;
      transform: scale(1.1);
      box-shadow: 0 12px 30px rgba(37, 211, 102, 0.55);
    }
    @keyframes floatPulse {
      0% { box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4); }
      50% { box-shadow: 0 8px 40px rgba(37, 211, 102, 0.7); }
      100% { box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4); }
    }

    .footer-note {
      text-align: center;
      margin-top: 3rem;
      padding: 1.8rem 1rem;
      color: #777;
      font-size: 0.95rem;
      background-color: #fff;
      border-top: 1px solid #eee;
      line-height: 1.8;
    }
    .footer-note .brand {
      color: #d4af37;
      font-weight: 700;
    }

    .loading {
      text-align: center;
      padding: 4rem;
      color: #999;
      font-size: 1.1rem;
    }

    @media (max-width: 600px) {
      .logo {
        max-width: 130px;
      }
      .header .subtitle {
        font-size: 0.95rem;
      }
      .products-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
        padding: 0 0.2rem;
      }
      .card img {
        height: 280px;
      }
      .card-content {
        padding: 1.5rem;
      }
      .card-title {
        font-size: 1.4rem;
      }
      .card-desc {
        font-size: 1rem;
      }
      .price {
        font-size: 1.6rem;
      }
      .floating-whatsapp {
        width: 54px;
        height: 54px;
        bottom: 18px;
        right: 18px;
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <img src="https://drive.google.com/file/d/101dsjxH_TR6fcLHSk5FOw8tSNJRr-f_G/view?usp=drivesdk" alt="K4HLD STORE" class="logo">
    <p class="subtitle">
      ✨ حسابات <span>قوية</span> بأسعار <span>مميزة</span> ✨<br>
      اكتشف مجموعتنا المتميزة من الحسابات المتنوعة 🌟
    </p>
  </header>

  <main class="container">
    <div class="loading" id="loading">🔄 جاري تحميل المنتجات...</div>
    <div class="products-grid" id="productsContainer" style="display:none;"></div>
  </main>

  <footer class="footer-note">
    <span class="brand">K4HLD STORE</span> — قد يتم خفض بعض الأسعار، تواصل معنا على واتساب لمزيد من المعلومات
  </footer>

  <a href="https://wa.me/212770306095?text=مرحباً K4HLD STORE، أريد الاستفسار عن أحد المنتجات" 
     class="floating-whatsapp" 
     target="_blank" 
     rel="noopener" 
     aria-label="تواصل عبر واتساب"
     title="تواصل معنا على واتساب">
    <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" fill="white" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
  </a>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <img src="" alt="صورة المنتج" id="lightboxImg">
  </div>

  <script>
    const SPREADSHEET_ID = '17K0V11uG3kzNpwXo7VNZlsVSp8saoOwSeAa5IzRqBMU';
    const SHEET_NAME = 'Sheet1';
    const PHONE_NUMBER = '212770306095';
    const CURRENCY = 'DH';

    const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;

    function csvToArray(csv) {
      const lines = csv.trim().split('\n');
      if (lines.length < 2) return [];
      const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
      const result = [];
      for (let i = 1; i < lines.length; i++) {
        const currentline = lines[i].split(',').map(c => c.trim().replace(/^"|"$/g, ''));
        const obj = {};
        headers.forEach((header, index) => {
          obj[header] = currentline[index] || '';
        });
        if (obj.title && obj.title.trim() !== '') {
          result.push(obj);
        }
      }
      return result;
    }

    function renderProducts(products) {
      const container = document.getElementById('productsContainer');
      const loading = document.getElementById('loading');
      
      loading.style.display = 'none';
      container.style.display = 'grid';
      container.innerHTML = '';

      if (products.length === 0) {
        container.innerHTML = `
          <div style="grid-column:1/-1;text-align:center;padding:3rem;color:#999;">
            🛍️ لا توجد منتجات حالياً. ترقبوا جديدنا قريباً!
          </div>`;
        return;
      }

      products.forEach(product => {
        const message = product.whatsapp_message || 
                        `مرحباً K4HLD STORE، أريد الاستفسار عن: ${product.title}`;
        const encodedMessage = encodeURIComponent(message);
        const whatsappLink = `https://wa.me/${PHONE_NUMBER}?text=${encodedMessage}`;
        const imageSrc = product.image || 'https://via.placeholder.com/400x300/1a1a1a/d4af37?text=K4HLD+STORE';

        const cardHTML = `
          <article class="card">
            <img src="${imageSrc}" 
                 alt="${product.title}" 
                 class="card-img"
                 loading="lazy" 
                 onerror="this.src='https://via.placeholder.com/400x300/1a1a1a/d4af37?text=${encodeURIComponent(product.title || 'K4HLD STORE')}'">
            <div class="card-content">
              <h3 class="card-title">${product.title}</h3>
              <p class="card-desc">${product.description}</p>
              <div class="card-footer">
                <span class="price">${product.price} ${CURRENCY}</span>
                <a href="${whatsappLink}" target="_blank" rel="noopener" class="whatsapp-btn">
                  📞 واتساب
                </a>
              </div>
            </div>
          </article>
        `;
        container.innerHTML += cardHTML;
      });
    }

    fetch(SHEET_CSV_URL)
      .then(response => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.text();
      })
      .then(csvText => {
        const products = csvToArray(csvText);
        renderProducts(products);
      })
      .catch(error => {
        document.getElementById('loading').innerHTML = 
          '⚠️ تعذر تحميل المنتجات حالياً. تأكد أن الملف عام (أي شخص لديه الرابط يمكنه العرض).';
        console.error('Fetch error:', error);
      });

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxClose = document.getElementById('lightboxClose');

    document.addEventListener('click', function(e) {
      if (e.target.classList.contains('card-img')) {
        lightboxImg.src = e.target.src;
        lightbox.classList.add('active');
      }
    });

    lightboxClose.addEventListener('click', function() {
      lightbox.classList.remove('active');
    });

    lightbox.addEventListener('click', function(e) {
      if (e.target === lightbox) {
        lightbox.classList.remove('active');
      }
    });
  </script>

</body>
</html>
